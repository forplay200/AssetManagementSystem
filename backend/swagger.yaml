openapi: 3.0.0
info:
  title: Asset Management System API
  version: '1.0'
  description: API for the AI-Enhanced Collaborative Digital Asset Management Platform
servers:
  - url: http://localhost:3000/api
    description: Local server
paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: User created
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Successful login
  /auth/forgot-password:
    post:
      summary: Create a password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Recovery request accepted
  /auth/reset-password:
    post:
      summary: Reset a password using a valid token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset successfully
  /teams:
    get:
      summary: List teams for the authenticated account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Team memberships
    post:
      summary: Create a team; the creator becomes Owner
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 2 }
      responses:
        '201':
          description: Team created
  /teams/join:
    post:
      summary: Join a team as Collaborator using an invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteCode]
              properties:
                inviteCode: { type: string, minLength: 6 }
      responses:
        '201':
          description: Team joined
  /teams/current:
    get:
      summary: Get the active team and its members
      description: Requires X-Workspace-Id for the selected workspace.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Active team details
  /teams/current/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
      - in: path
        name: userId
        required: true
        schema: { type: integer }
    patch:
      summary: Change a member workspace role (Owner only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Team role updated
    delete:
      summary: Remove a team member (Owner only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Team member removed
  /teams/current/invite-code:
    post:
      summary: Rotate the active team invite code (Owner only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Invite code rotated
  /users:
    get:
      summary: List users (Administrator only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
    post:
      summary: Create a user (Administrator only)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get a user (Administrator only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details
    put:
      summary: Update a user or role (Administrator only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User updated
    delete:
      summary: Delete a user (Administrator only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User deleted
  /assets/{id}/details:
    get:
      summary: Get authenticated asset details including ownership
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Asset details
  /assets/search:
    get:
      summary: Search and filter assets
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: filename
          schema: { type: string }
          description: Original upload name, with generated storage name as a compatibility fallback
        - in: query
          name: metadata
          schema: { type: string }
          description: Text contained anywhere in asset metadata
        - in: query
          name: q
          schema: { type: string }
          description: AI metadata text in imageTags, semanticTags, modelTags, audioTags, keywords, transcript, or summary
        - in: query
          name: aiTag
          schema: { type: string }
          description: Legacy AI metadata search alias
        - in: query
          name: tags
          schema: { type: string }
          description: Comma-separated repository tags
        - in: query
          name: type
          schema: { type: string, enum: [image, audio, video, text, model] }
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: creator
          schema: { type: string }
          description: User ID or username text
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200':
          description: Paginated matching assets
  /assets/{assetId}/tags:
    parameters:
      - in: path
        name: assetId
        required: true
        schema:
          type: integer
    get:
      summary: List repository tags
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Asset tags
    post:
      summary: Add a repository tag
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tag added
    delete:
      summary: Remove a repository tag
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tag removed
  /assets/{id}/versions/upload:
    post:
      summary: Upload a replacement file and preserve the previous current file in version history
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [asset]
              properties:
                asset:
                  type: string
                  format: binary
                changeLog:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: Previous file preserved and replacement made current
        '400':
          description: Missing or unsupported replacement file
        '403':
          description: Only the asset owner or an Administrator can replace the file
        '404':
          description: Asset not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceId:
      in: header
      name: X-Workspace-Id
      required: true
      description: Active workspace membership selected by the client. X-Team-Id remains accepted as a temporary compatibility alias.
      schema:
        type: integer
  schemas:
    UserRegister:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: secret123
        role:
          type: string
          enum: [user]
          default: user
          description: Public registration always creates an unassigned User unless the legacy deployment override is explicitly enabled.
    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: secret123
